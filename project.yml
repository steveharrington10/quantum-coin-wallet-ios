# XcodeGen spec for the iOS clone of the Quantum Coin Wallet.
#
# Build:
#   brew install xcodegen
#   cd ios
#   xcodegen generate
#   open QuantumCoinWallet.xcodeproj
#
# The generated .xcodeproj is intentionally not committed - regenerate from
# this spec on macOS so the project is always in sync with the source tree.

name: QuantumCoinWallet
options:
  bundleIdPrefix: org.quantumcoin
  deploymentTarget:
    iOS: "15.0"
  minimumXcodeGenVersion: "2.38.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    PRODUCT_NAME: $(TARGET_NAME)
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    ENABLE_BITCODE: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    SUPPORTS_MACCATALYST: NO

targets:
  QuantumCoinWallet:
    type: application
    platform: iOS
    # Regenerate `Generated/BundleHash_Generated.swift`
    # at the start of every build so the embedded SHA-256 always
    # matches the shipping `quantumcoin-bundle.js`. The generated
    # constant is consumed by `BundleIntegrity.verifyOrFail` at
    # boot (AppDelegate) and at WKURLSchemeHandler serving time
    # (defense-in-depth). Out-of-date hashes are impossible by
    # construction because the script declares the bundle as an
    # input file - Xcode reruns the script whenever the bundle
    # changes.
    preBuildScripts:
      - path: scripts/embed_bundle_hash.sh
        name: "Embed JS bundle SHA-256"
        shell: /bin/bash
        runOnlyWhenInstalling: false
        inputFiles:
          - $(SRCROOT)/QuantumCoinWallet/Resources/quantumcoin-bundle.js
        outputFiles:
          - $(SRCROOT)/QuantumCoinWallet/Generated/BundleHash_Generated.swift
        basedOnDependencyAnalysis: true
    sources:
      - path: QuantumCoinWallet
        excludes:
          - "**/*.md"
          # INFOPLIST_FILE + info.path already own Info.plist; including it
          # here adds Copy Bundle Resources and causes "Multiple commands produce
          # .../QuantumCoinWallet.app/Info.plist" on modern Xcode.
          - Info.plist
    resources:
      - path: QuantumCoinWallet/Resources
        buildPhase: resources
      - path: QuantumCoinWallet/Assets.xcassets
        buildPhase: resources
      - path: QuantumCoinWallet/LaunchScreen.storyboard
        buildPhase: resources
    info:
      path: QuantumCoinWallet/Info.plist
      properties:
        CFBundleDisplayName: "Quantum Wallet"
        # Required by App Store validation (asset catalog set name).
        CFBundleIconName: "AppIcon"
        CFBundleName: "QuantumCoinWallet"
        CFBundleShortVersionString: "2.3"
        CFBundleVersion: "2.3"
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: "LaunchScreen"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes: []
        NSCameraUsageDescription: >-
          Camera access is used to scan QR codes when entering a recipient
          wallet address.
        # Both flags disabled so the QuantumCoin
        # folder no longer appears in iOS Files / iTunes / Finder.
        # The app does NOT write user-visible files to its sandbox
        # `Documents/` directory (verified by `rg
        # "documentDirectory|applicationSupportDirectory|cachesDirectory"
        # QuantumCoinWallet/`):
        #   - Encrypted prefs / strongbox: `Application Support/`
        #   - Staged backup exports: `tmp/<csprng>/qcw-backup-...`
        #   - User-picked backup writes: arrive via
        #     `UIDocumentPickerViewController` (security-scoped URL),
        #     so the user chooses iCloud Drive / Files / etc.
        # Closing this surface means a future commit cannot
        # accidentally spill secrets into a Files-app-visible folder
        # (defense-in-depth). The single existing reference to
        # `.documentDirectory` in `CloudBackupManager` is only used
        # as the *initial-display directoryURL* for the folder
        # picker; the picker itself continues to work because
        # `Documents/` still exists inside the sandbox - it is only
        # the external visibility (iTunes / Files-app) that is
        # removed by these flags being false.
        UIFileSharingEnabled: false
        LSSupportsOpeningDocumentsInPlace: false
        # Declared so `UIApplication.canOpenURL`
        # can return `true` for the package-manager URL schemes
        # that Cydia / Sileo / Zebra register on a jailbroken
        # device. Without this declaration `canOpenURL` returns
        # `false` for every unknown scheme and the URL-handler
        # probe in `Security/TamperGate.swift` becomes a no-op.
        # The review-friendly visibility of these scheme names in
        # the Info.plist is itself a benefit: any reviewer
        # (Apple's static analyser, an external reviewer, a
        # security researcher reading the bundle) can see at a
        # glance that this app probes for jailbreak package
        # managers. iOS caps `LSApplicationQueriesSchemes` at 50
        # entries; we use 6.
        LSApplicationQueriesSchemes:
          - cydia
          - sileo
          - zbra
          - filza
          - undecimus
          - activator
        # WKAppBoundDomains intentionally NOT set. Apple's
        # app-bound-domains policy (TN3171) only applies to
        # HTTP/HTTPS navigations; the wallet's bundle is loaded
        # exclusively via the custom `appassets://` scheme through
        # `WKURLSchemeHandler`, which bypasses the policy. The
        # previous setup paired `limitsNavigationsToAppBoundDomains
        # = true` with the literal entry `"appassets"` (a URL-scheme
        # name, NOT a hostname); on iOS 17+ / iOS 26 that
        # mis-configuration silently blocks the bridge load and
        # surfaces as a 30-second "Bridge not ready" timeout. The
        # actual defenses for this finding are now provided by:
        #   - The custom-scheme-only design of bridge.html (no
        #     https loads, no remote scripts).
        #   - The bundle-resource allowlist in
        #     `AppAssetsSchemeHandler`.
        #   - The bundle-hash pin.
        # If a future change ever introduces an https:// load into
        # this WebView, re-enable the policy AND populate this key
        # with real public-suffix-list hostnames (NOT scheme names).
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Quantum Coin Wallet"
            LSHandlerRank: "Owner"
            LSItemContentTypes: ["org.quantumcoin.wallet"]
            CFBundleTypeRole: "Viewer"
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: "org.quantumcoin.wallet"
            UTTypeDescription: "Quantum Coin Wallet backup"
            UTTypeConformsTo: ["public.data"]
            UTTypeTagSpecification:
              "public.filename-extension": ["wallet"]
        # TLS 1.3 minimum on every in-process project-owned host.
        # Applies to both `URLSession` (the scan API) and the
        # WKWebView JsonRpcProvider (the bundled MAINNET RPC).
        # `quantumscan.com` is intentionally absent: block-explorer
        # URLs are opened via `UIApplication.open(...)`, which hands
        # off to Safari outside our process; iOS app-side ATS has
        # no effect on that handshake. User-defined custom RPC
        # hostnames are unknown at build time and fall through to
        # the platform ATS default (TLS 1.2 minimum) — matches the
        # Android sibling's WebView limitation.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            app.readrelay.quantumcoinapi.com:
              NSExceptionMinimumTLSVersion: "TLSv1.3"
              NSIncludesSubdomains: false
            public.rpc.quantumcoinapi.com:
              NSExceptionMinimumTLSVersion: "TLSv1.3"
              NSIncludesSubdomains: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.quantumcoin.wallet
        INFOPLIST_FILE: QuantumCoinWallet/Info.plist
        # Merged into the built Info.plist (belt-and-suspenders with the
        # committed Info.plist); avoids App Store 90713 if a build phase
        # ever strips plist keys.
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        CODE_SIGN_ENTITLEMENTS: QuantumCoinWallet/QuantumCoinWallet.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic

  QuantumCoinWalletTests:
    type: bundle.unit-test
    platform: iOS
    sources: [QuantumCoinWalletTests]
    dependencies:
      - target: QuantumCoinWallet
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QuantumCoinWallet.app/QuantumCoinWallet"
        # XcodeGen does not auto-generate an Info.plist for
        # unit-test bundles by default; opt in to the
        # auto-generation so we don't have to commit a separate
        # plist for tests.
        GENERATE_INFOPLIST_FILE: YES

schemes:
  QuantumCoinWallet:
    build:
      targets:
        QuantumCoinWallet: all
        QuantumCoinWalletTests: [test]
    test:
      commandLineArguments:
        "-com.apple.CoreData.ConcurrencyDebug 1": true
      gatherCoverageData: true
      targets:
        - QuantumCoinWalletTests
