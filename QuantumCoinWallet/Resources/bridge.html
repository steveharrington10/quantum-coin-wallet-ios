<!DOCTYPE html>

<body>
<script>
// Diagnostic console output is gated behind AndroidBridge.isDebug()
// so release builds never stringify exception state (which could contain
// sensitive argument values) into logcat via onConsoleMessage.
// the diagnostic output below is further restricted to
// log only opaque category tokens plus the requestId. The raw
// exception message and any payload-derived field is NEVER
// emitted, even in DEBUG, because:
// * `JsBridgeError` messages from a failing decrypt include
// ciphertext bytes;
// * `JSON.parse` failures echo the bad input, which for the
// `walletJson` / `password` paths is the user's secret;
// * `window.onerror` `message` arguments include the offending
// line of code from the SDK, which can include any string the
// caller passed in.
// The opaque category token (e.g. `"AEAD_FAIL"`, `"PARSE_FAIL"`)
// is enough for a developer to locate the failing code path; the
// message itself is intentionally suppressed to keep the bridge
// from being a side-channel that exfiltrates whatever the failing
// payload was. The Swift side already sees the full error via the
// `success: false, error: message` JSON it gets back from
// `AndroidBridge.onResult`, which is the right channel for the
// detail to reach the developer (and which is itself routed
// through `Logger.debug` on the Swift side, where it is redacted).
function _isDebug() {
 try {
 return typeof AndroidBridge !== 'undefined'
 && typeof AndroidBridge.isDebug === 'function'
 && AndroidBridge.isDebug() === true;
 } catch (_) {
 return false;
 }
}
function _categorize(message) {
 var s = String(message || '').toLowerCase();
 if (s.indexOf('aead') >= 0 || s.indexOf('cipher') >= 0
 || s.indexOf('decrypt') >= 0 || s.indexOf('mac') >= 0) {
 return 'AEAD_FAIL';
 }
 if (s.indexOf('parse') >= 0 || s.indexOf('json') >= 0
 || s.indexOf('syntax') >= 0) {
 return 'PARSE_FAIL';
 }
 if (s.indexOf('initialize') >= 0 || s.indexOf('sdk') >= 0
 || s.indexOf('bundle') >= 0) {
 return 'SDK_FAIL';
 }
 if (s.indexOf('payload') >= 0 || s.indexOf('missing') >= 0) {
 return 'PAYLOAD_FAIL';
 }
 if (s.indexOf('network') >= 0 || s.indexOf('rpc') >= 0
 || s.indexOf('fetch') >= 0) {
 return 'NETWORK_FAIL';
 }
 return 'OTHER_FAIL';
}
window.onerror = function(message, source, lineno, colno, error) {
 if (_isDebug()) {
 console.error('UNCAUGHT_JS [' + _categorize(message) + '] at line ' + lineno);
 }
 return true;
};
</script>
<script src="quantumcoin-bundle.js" onerror="if (_isDebug()) console.error('SDK_FAIL: bundle load failed')"></script>
<script>
if (_isDebug()) {
 console.log('Bridge: bundle defined = ' + (typeof QuantumCoinSDK !== 'undefined'));
 if (typeof QuantumCoinSDK === 'undefined') {
 console.error('SDK_FAIL: QuantumCoinSDK undefined post-load');
 }
}

var _sdkInitialized = false;
// Track the (chainId, rpcEndpoint) the SDK was last Initialized
// with so the signing handlers can SKIP a redundant
// `QuantumCoinSDK.Initialize(...)` when the config is unchanged.
// Re-Initializing per send re-pays the Go-WASM module
// compile + runtime bring-up cost on every transaction; guarding
// it removes that cost from the timed signing path while still
// re-initializing whenever the user switches network. `null`
// means "last init was offline / unconfigured" so the next
// configured call always re-initializes.
var _sdkInitChainId = null;
var _sdkInitRpc = null;

// DEBUG-only per-phase timing for the send path. Emits an opaque
// label plus millisecond deltas only (never any payload-derived
// string) through the AndroidBridge.debugLog channel so the
// durations reach the native log even when the overall bridge
// call later times out - each phase logs the moment it completes,
// so a 120s timeout still shows which phase was the long pole and
// how far execution got. Gated by _isDebug() so release builds
// emit nothing.
function _now() {
 return (typeof performance !== 'undefined' && performance.now)
 ? performance.now() : Date.now();
}
function _timeLog(tag) {
 if (!_isDebug()) return;
 try {
 if (typeof AndroidBridge !== 'undefined'
 && typeof AndroidBridge.debugLog === 'function') {
 AndroidBridge.debugLog('TIMING ' + tag);
 }
 console.log('TIMING ' + tag);
 } catch (_) {}
}

function bytesToBase64(bytes) {
 var binary = '';
 for (var i = 0; i < bytes.length; i++) {
 binary += String.fromCharCode(bytes[i]);
 }
 return btoa(binary);
}

function base64ToBytes(b64) {
 var binary = atob(b64);
 var bytes = new Uint8Array(binary.length);
 for (var i = 0; i < binary.length; i++) {
 bytes[i] = binary.charCodeAt(i);
 }
 return bytes;
}

function hexToBytes(hex) {
 if (!hex) return new Uint8Array(0);
 var clean = hex.startsWith('0x') ? hex.slice(2) : hex;
 if (clean.length % 2 !== 0) throw new Error('invalid hex length');
 var bytes = new Uint8Array(clean.length / 2);
 for (var i = 0; i < bytes.length; i++) {
 bytes[i] = parseInt(clean.substr(i * 2, 2), 16);
 }
 return bytes;
}

// symmetric binary channels between Swift and the JS
// bridge. The QuantumCoin SDK already returns the private and
// public key bytes as Uint8Array (`wallet.signingKey.privateKeyBytes`
// / `publicKeyBytes`), and accepts Uint8Array as input to its
// signing constructors. Previously the bridge stringified those
// bytes via `bytesToBase64(...)` before handing them back to
// Swift, then base64-decoded them again on the way back into JS
// for the signing handler. JS strings are immutable, so every
// such intermediate base64 string lived in V8's string pool until
// GC, which made true zeroization impossible.
// The new channel routes raw bytes via two synchronous XHR helpers
// `stagePendingResultBinary` (JS -> Swift) and `pullPayloadBinary`
// (Swift -> JS). Each call uses a per-(rid, key) capability token
// injected by Swift into `window.__bridgeBinaryTokens[direction][rid][key]`.
// The Uint8Array buffer can be wiped in place via `.fill(0)` after
// it has been handed off, which is the JS-side guarantee we lacked
// before. See `JsEngine.swift` (`PendingBinaryStore`) for the Swift-
// side implementation.
function pullPayloadBinary(rid, key) {
 var tokens = (window.__bridgeBinaryTokens || {}).out || {};
 var ridMap = tokens[rid] || {};
 var token = String(ridMap[key] || '');
 if (!token) throw new Error('binary pull: no token for ' + rid + '/' + key);
 var url = 'appassets:///bridge-binary-pull/'
 + encodeURIComponent(rid) + '/'
 + encodeURIComponent(key) + '/'
 + encodeURIComponent(token);
 var xhr = new XMLHttpRequest();
 xhr.open('GET', url, false);
 xhr.responseType = 'arraybuffer';
 xhr.send(null);
 if (xhr.status !== 200) throw new Error('binary pull failed: status ' + xhr.status);
 // Single-use token; drop after success so a replay surfaces
 // as a missing-token throw on the next call.
 try { delete ridMap[key]; } catch (_) {}
 return new Uint8Array(xhr.response || new ArrayBuffer(0));
}

function stagePendingResultBinary(rid, key, uint8) {
// WKURLSchemeHandler on iOS does NOT reliably
 // receive XHR POST bodies for custom schemes (the body is
 // stripped by WebKit before reaching the scheme handler).
 // We therefore push the binary via the existing
 // `WKScriptMessageHandler` channel. The bytes travel as a
 // JS Array of small integers, which is bridged to a
 // CFArray of NSNumbers and reassembled as `Data` on the
 // Swift side. This is NOT a string round-trip - no V8
 // string-pool entry is created for the bytes - but a JS
 // Array temporarily holds copies of the bytes; we drop
 // the Array reference and zero the source Uint8Array
 // immediately after handoff.
 var tokens = (window.__bridgeBinaryTokens || {})['in'] || {};
 var ridMap = tokens[rid] || {};
 var token = String(ridMap[key] || '');
 if (!token) throw new Error('binary push: no token for ' + rid + '/' + key);
 // Manual array fill (not Array.from) so we don't create
 // any incidental closures over `uint8` that the JIT
 // might keep alive past this call.
 var arr = new Array(uint8.length);
 for (var i = 0; i < uint8.length; i++) {
  arr[i] = uint8[i];
 }
 try {
  window.webkit.messageHandlers.androidBridge.postMessage({
   m: 'pushBinary',
   args: [String(rid), String(key), token, arr]
  });
 } finally {
  // Single-use token; drop it so the next invocation must
  // present a fresh Swift-issued reservation.
  try { delete ridMap[key]; } catch (_) {}
  // Wipe the JS-side source buffer in place after handoff.
  try { uint8.fill(0); } catch (_) {}
  // Drop the temporary Array so its bytes become eligible
  // for GC. (Setting elements to 0 first does NOT mutate
  // V8's underlying allocation but does clear the property
  // values reachable from this scope.)
  for (var j = 0; j < arr.length; j++) { arr[j] = 0; }
  arr = null;
 }
}

// Stage privateKey + publicKey on the inbound (JS -> Swift)
// binary channel and return the metadata-only envelope that
// `sendResult` will JSON-stringify. Used by the wallet-creation
// handlers (`createRandom`, `walletFromSeed`, `walletFromPhrase`,
// `walletFromKeys`) so the secret bytes never appear in the
// `sendResult` JSON envelope.
function stageWalletKeysBinary(requestId, wallet) {
 stagePendingResultBinary(requestId, 'privateKey',
   wallet.signingKey.privateKeyBytes);
 stagePendingResultBinary(requestId, 'publicKey',
   wallet.signingKey.publicKeyBytes);
}

function extractWalletInfo(wallet) {
 // Address only. Secret bytes are staged via
 // `stageWalletKeysBinary` by the caller BEFORE this function
 // is invoked.
 return { address: wallet.address };
}

function sendResult(requestId, data) {
 AndroidBridge.onResult(requestId, JSON.stringify({ success: true, data: data }));
}

function sendError(requestId, error) {
 var message = (error && error.message) ? error.message : String(error);
 if (_isDebug()) {
 // Log only the requestId and an opaque
 // category. The raw `message` may contain ciphertext, the
 // failing payload, or part of the user's typed input; we
 // forward it to the Swift side via `onResult` (where it
 // is routed through `Logger.debug` and redacted), but it
 // never reaches Console.app from this bridge.
 console.error('BRIDGE_ERR [' + _categorize(message) + '] req=' + requestId);
 }
 AndroidBridge.onResult(requestId, JSON.stringify({ success: false, error: message }));
}

function requireSDK(requestId) {
 if (typeof QuantumCoinSDK === 'undefined') {
 sendError(requestId, 'QuantumCoinSDK bundle failed to load. Check logcat for JS errors.');
 return false;
 }
 return true;
}

function requireSeedWordsSDK(requestId) {
 if (typeof SeedWordsSDK === 'undefined') {
 sendError(requestId, 'SeedWordsSDK bundle failed to load. Check logcat for JS errors.');
 return false;
 }
 return true;
}

async function ensureInitialized(requestId) {
 if (!requireSDK(requestId)) return false;
 if (!_sdkInitialized) {
 var result = await QuantumCoinSDK.Initialize(null);
 _sdkInitialized = true;
 // Offline/unconfigured init: leave the config trackers null
 // so a later configured signing call re-initializes.
 _sdkInitChainId = null;
 _sdkInitRpc = null;
 if (_isDebug()) {
 // Opaque status only; the SDK Initialize result
 // includes config-derived strings (RPC endpoint URL,
 // chain id) we do not need on Console.
 console.log('SDK_OK auto-init');
 }
 }
 return true;
}

// Initialize the SDK for (chainId, rpcEndpoint) only when the
// current config differs from the last one. Avoids re-paying the
// Go-WASM bring-up cost on every send. Returns nothing; throws on
// SDK failure (caller is inside a try/catch).
async function ensureConfigured(chainId, rpcEndpoint) {
 if (!_sdkInitialized
 || _sdkInitChainId !== chainId
 || _sdkInitRpc !== rpcEndpoint) {
 await QuantumCoinSDK.Initialize(
 new QuantumCoinSDK.Config(chainId, rpcEndpoint));
 _sdkInitialized = true;
 _sdkInitChainId = chainId;
 _sdkInitRpc = rpcEndpoint;
 }
}

// Launch-time warm-up (fired fire-and-forget by the native side as
// soon as the bridge becomes ready). Pays the one-time Go-WASM
// compile + runtime + PQC-keygen cost OFF the critical path, so the
// user's first transaction does not absorb module bring-up on top
// of signing. Network-free (offline Initialize) and the throwaway
// wallet is never persisted or returned. Best-effort: any failure
// is swallowed so a warm-up problem never blocks the bridge.
async function _warmup() {
 try {
 if (typeof QuantumCoinSDK === 'undefined') return;
 var _w0 = _now();
 await QuantumCoinSDK.Initialize(null);
 _sdkInitialized = true;
 _sdkInitChainId = null;
 _sdkInitRpc = null;
 // Exercise the circl PQC WASM once so the module is
 // compiled/instantiated and the Go runtime is started before
 // the first real send. Keygen is the cheapest call that still
 // forces full WASM bring-up.
 try { QuantumCoinSDK.Wallet.createRandom(); } catch (_) {}
 _timeLog('warmup=' + Math.round(_now() - _w0) + 'ms');
 } catch (_) {}
}

// Sensitive payloads (passwords, private keys, seed words) are never
// interpolated into the evaluateJavascript string. They are staged by
// the native side in a thread-safe map and pulled here. The
// getPendingPayload call consumes the entry, so replays are rejected
// (empty payload -> handler fails loud).
function pullPayload(requestId) {
 var raw = null;
 try {
 if (typeof AndroidBridge !== 'undefined' &&
 typeof AndroidBridge.getPendingPayload === 'function') {
 raw = AndroidBridge.getPendingPayload(requestId);
 }
 } catch (e) {
 sendError(requestId, 'pullPayload threw: ' + (e && e.message ? e.message : e));
 return null;
 }
 if (!raw) {
 sendError(requestId, 'missing or already-consumed payload for requestId');
 return null;
 }
 try {
 return JSON.parse(raw);
 } catch (pe) {
 sendError(requestId, 'payload JSON parse failed');
 return null;
 }
}

// The name "zeroString" is historical and slightly misleading. JS
// strings are IMMUTABLE; the bytes that already live in the V8
// string pool from the previous `pullPayload` parse cannot be
// overwritten in place. What this helper actually does is:
// 1. Reassign the property to the empty string '', so the
// owning object no longer holds a strong reference to the
// sensitive value, and
// 2. Drop the JSON.parse'd string from the property graph as
// soon as the surrounding `try { ... } finally { ... }`
// returns, so V8's garbage collector can reclaim the string
// on its next sweep.
// The previous bytes remain in memory until GC actually runs.
// That window is bounded but non-zero. A heap snapshot taken
// between the `finally` and the next major GC cycle can still
// contain the password, private key, etc.
// The truthful summary for a reviewer: "best-effort, GC-bounded
// reachability drop, NOT in-place wipe". The stronger guarantee
// would require either (a) marshalling secrets as Uint8Array
// from native code so we can call `.fill(0)` on them (which we
// already do for `privBytes` / `passwordBytes` in the same
// `finally` blocks below), or (b) running scrypt entirely
// outside the JS engine. Both are tracked as future work; this
// file is the JS-side acknowledgement of the residual exposure.
function zeroString(ref, key) {
 if (ref && typeof ref[key] === 'string') {
 try { ref[key] = ''; } catch (_) { /* ignore */ }
 }
}

var bridge = {
 initialize: async function(requestId, chainId, rpcEndpoint) {
 try {
 if (!requireSDK(requestId)) return;
 await QuantumCoinSDK.Initialize(new QuantumCoinSDK.Config(chainId, rpcEndpoint));
 _sdkInitialized = true;
 _sdkInitChainId = chainId;
 _sdkInitRpc = rpcEndpoint;
 sendResult(requestId, {});
 } catch (e) {
 sendError(requestId, e);
 }
 },

 initializeOffline: async function(requestId) {
 try {
 if (!requireSDK(requestId)) return;
 var result = await QuantumCoinSDK.Initialize(null);
 _sdkInitialized = true;
 if (_isDebug()) {
 // Opaque status only.
 console.log('SDK_OK init-offline req=' + requestId);
 }
 sendResult(requestId, {});
 } catch (e) {
 sendError(requestId, e);
 }
 },

 createRandomSeed: async function(requestId, keyType) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 var words = await QuantumCoinSDK.Wallet.createRandomSeed(keyType);
 sendResult(requestId, words);
 } catch (e) {
 sendError(requestId, e);
 }
 },

 createRandom: async function(requestId, keyType) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 var kt = (keyType === 0 || keyType == null) ? undefined : keyType;
 var wallet = QuantumCoinSDK.Wallet.createRandom(undefined, kt);
 var seedHex = wallet.seed;
 if (!seedHex) {
 sendError(requestId, 'createRandom returned wallet without seed');
 return;
 }
 if (!requireSeedWordsSDK(requestId)) return;
 var seedBytes = hexToBytes(seedHex);
 var words = SeedWordsSDK.getWordListFromSeedArray(seedBytes);
 if (!Array.isArray(words)) {
 sendError(requestId, 'getWordListFromSeedArray returned non-array');
 return;
 }
 // Stage privateKey/publicKey on the binary channel
 // BEFORE sendResult so Swift sees them when it consumes the
 // envelope. The JSON envelope carries only address + seed
 // metadata; the secret bytes never enter the JSON string pool.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, {
 address: wallet.address,
 seed: seedHex,
 seedWords: words
 });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 walletFromSeed: async function(requestId) {
 var payload = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 var wallet = await QuantumCoinSDK.Wallet.fromSeed(payload.seedArray);
 // Secrets via binary channel; envelope carries address only.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, extractWalletInfo(wallet));
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (payload) {
 try { payload.seedArray = null; } catch (_) {}
 }
 }
 },

 walletFromPhrase: async function(requestId) {
 var payload = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 var wallet = await QuantumCoinSDK.Wallet.fromPhrase(payload.words);
 // Secrets via binary channel.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, extractWalletInfo(wallet));
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (payload) {
 try { payload.words = null; } catch (_) {}
 }
 }
 },

 walletFromKeys: async function(requestId) {
 var privBytes = null;
 var pubBytes = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 // Pull private/public key bytes from the binary channel
 // rather than base64-decoding from a JSON payload.
 // The bytes never appear in any JS string pool.
 privBytes = pullPayloadBinary(requestId, 'privKey');
 pubBytes = pullPayloadBinary(requestId, 'pubKey');
 var wallet = await QuantumCoinSDK.Wallet.fromKeys(privBytes, pubBytes);
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, extractWalletInfo(wallet));
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (privBytes) { try { privBytes.fill(0); } catch (_) {} }
 if (pubBytes) { try { pubBytes.fill(0); } catch (_) {} }
 }
 },

// native-coin send.
 // We use the SDK's high-level `wallet.sendTransaction(...)`
 // surface (the same call shape the Android wallet uses, see
 // `quantum-coin-wallet-android/app/src/main/assets/bridge.html`
 // `sendTransaction`). Internally the SDK:
 //   1. Calls `wallet.populateTransaction(tx)` to fill in the
 //      nonce / chainId / from-address fields the user did not
 //      supply.
 //   2. Calls `wallet.signTransaction(populated)` which derives
 //      the canonical transaction hash LOCALLY from the signed
 //      bytes (this is the keccak256 of the signed RLP payload,
 //      independent of any RPC).
 //   3. Calls `provider.sendTransaction(rawBytes)` to broadcast.
 //   4. Returns a `TransactionResponse` whose `.hash` field is
 //      the locally-derived hash from step 2.
 // We surface that `tx.hash` to Swift as `txHash`. Because the
 // hash is derived from the bytes WE signed (not from anything
 // the RPC tells us), the user can independently verify the
 // transaction on a block explorer using the returned hash; if
 // a hostile RPC mines different bytes the user's hash will
 // simply not appear on chain (rather than appearing with the
 // wrong fields). See `Networking/TlsPinning.swift` for why we
 // do not pin RPC TLS by design (decentralization), and the
 // user-visible block-explorer link in
 // `TransactionSentDialogViewController` for the recommended
 // verification path.
 // Why this shape (vs. low-level `signRawTransaction`)
 //   The previous implementation tried to call
 //   `QuantumCoinSDK.signRawTransaction(...)` directly to
 //   re-derive the hash before broadcast. That symbol is not
 //   exposed on the top-level `QuantumCoinSDK` namespace at
 //   runtime (only `signSendCoinTransaction` and the
 //   `wallet.signTransaction` instance method are public), so
 //   the whole send path failed with
 //   `signRawTransaction is not exposed by QuantumCoinSDK bundle`.
 //   The high-level surface used here is the one the SDK
 //   actually contracts to expose; it is the same surface the
 //   Android wallet has shipped for over a year. Using the
 //   public surface also means SDK upgrades that change the
 //   internal signing primitive do not break the wallet.
 sendTransaction: async function(requestId) {
 var payload = null;
 var privBytes = null;
 var pubBytes = null;
 try {
 var _t0 = _now();
 if (!requireSDK(requestId)) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 await ensureConfigured(payload.chainId, payload.rpcEndpoint);
 _timeLog('send.init=' + Math.round(_now() - _t0) + 'ms req=' + requestId);
 var _t1 = _now();
 var provider = new QuantumCoinSDK.JsonRpcProvider(
 payload.rpcEndpoint, payload.chainId);
 privBytes = pullPayloadBinary(requestId, 'privKey');
 pubBytes = pullPayloadBinary(requestId, 'pubKey');
 var wallet = await QuantumCoinSDK.Wallet.fromKeys(privBytes, pubBytes, provider);
 _timeLog('send.fromKeys=' + Math.round(_now() - _t1) + 'ms');
 var _t2 = _now();
 var signingContext = wallet.getSigningContext(payload.advancedSigning === true);
 _timeLog('send.getSigningContext=' + Math.round(_now() - _t2) + 'ms');
 var _t3 = _now();
 var tx = await wallet.sendTransaction({
 to: payload.to,
 value: BigInt(payload.value),
 gasLimit: Number(payload.gasLimit),
 signingContext: signingContext
 });
 _timeLog('send.sendTransaction(populate+sign+broadcast)='
 + Math.round(_now() - _t3) + 'ms total=' + Math.round(_now() - _t0) + 'ms');
 sendResult(requestId, { txHash: tx.hash });
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (privBytes) { try { privBytes.fill(0); } catch (_) {} }
 if (pubBytes) { try { pubBytes.fill(0); } catch (_) {} }
 }
 },

// ERC-20-style token transfer.
 // Same pattern as `sendTransaction` above, but the inner
 // transaction is an ERC-20 `transfer(address,uint256)` call.
 // We use the SDK's `IERC20.connect(contract, wallet)` to
 // build a `Contract` instance and then call `.transfer(to,
 // amount, overrides)` on it. The SDK internally:
 //   1. Calls `token.populateTransaction.transfer(to, amount)`
 //      to encode the `transfer` selector + arguments into the
 //      transaction `data` field.
 //   2. Calls `wallet.populateTransaction(tx)` to fill in
 //      nonce / chainId / from-address.
 //   3. Signs locally and derives `tx.hash` from signed bytes.
 //   4. Broadcasts through the connected provider.
 // This is byte-for-byte the same flow the Android wallet ships
 // (see `quantum-coin-wallet-android/.../bridge.html`
 // `sendTokenTransaction`); both wallets produce identical
 // transaction bytes for identical inputs, which is the
 // contract reviewers and exchanges rely on when comparing
 // hashes across our two clients.
 sendTokenTransaction: async function(requestId) {
 var payload = null;
 var privBytes = null;
 var pubBytes = null;
 try {
 var _t0 = _now();
 if (!requireSDK(requestId)) return;
 if (!QuantumCoinSDK.IERC20) {
 sendError(requestId, new Error(
 'IERC20 is not exposed by QuantumCoinSDK bundle'));
 return;
 }
 payload = pullPayload(requestId);
 if (!payload) return;
 await ensureConfigured(payload.chainId, payload.rpcEndpoint);
 _timeLog('token.init=' + Math.round(_now() - _t0) + 'ms req=' + requestId);
 var _t1 = _now();
 var provider = new QuantumCoinSDK.JsonRpcProvider(
 payload.rpcEndpoint, payload.chainId);
 privBytes = pullPayloadBinary(requestId, 'privKey');
 pubBytes = pullPayloadBinary(requestId, 'pubKey');
 var wallet = await QuantumCoinSDK.Wallet.fromKeys(privBytes, pubBytes, provider);
 _timeLog('token.fromKeys=' + Math.round(_now() - _t1) + 'ms');
 var _t2 = _now();
 var signingContext = wallet.getSigningContext(payload.advancedSigning === true);
 _timeLog('token.getSigningContext=' + Math.round(_now() - _t2) + 'ms');
 var _t3 = _now();
 var token = QuantumCoinSDK.IERC20.connect(payload.contract, wallet);
 var tx = await token.transfer(payload.to, BigInt(payload.amount), {
 gasLimit: Number(payload.gasLimit),
 signingContext: signingContext
 });
 _timeLog('token.transfer(populate+sign+broadcast)='
 + Math.round(_now() - _t3) + 'ms total=' + Math.round(_now() - _t0) + 'ms');
 sendResult(requestId, { txHash: tx.hash });
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (privBytes) { try { privBytes.fill(0); } catch (_) {} }
 if (pubBytes) { try { pubBytes.fill(0); } catch (_) {} }
 }
 },

 isValidAddress: async function(requestId, address) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 var valid = QuantumCoinSDK.isAddress(address);
 sendResult(requestId, { valid: valid });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 // Return the mixed-case checksum form of `address`. Used by the
 // transaction review dialog to render the recipient (and the From
 // wallet) in a typo-resistant capitalization. The user can
 // visually compare a typo'd address against the address they
 // expect: a single transposed hex digit changes the case-checksum
 // hash and therefore many letter positions, making the difference
 // obvious.
// the previous implementation had a `toLowerCase()` fallback
 // for "older bundle / SDK symbol missing" so the review
 // dialog would still render *something*. That fallback was a
 // silent typo-detection downgrade for the recipient (TO) address:
 // a malformed-but-valid-shape address would render as lowercase
 // and the user would never see the case-checksum mismatch they
 // would otherwise spot. The fallback has been removed - if the
 // SDK call fails or `QuantumCoinSDK.getAddress` is missing we
 // surface a hard error (`SDK_GETADDRESS_UNAVAILABLE`) and let the
 // Swift caller decide its policy:
 //   * SendViewController fail-closes for the TO address (toast +
 //     abort) - the user MUST be able to compare a checksum, that
 //     is the whole point of the review dialog.
 //   * SendViewController is permissive for the FROM address (it
 //     came from the user's own wallet, so a missing checksum is a
 //     UX regression rather than a signing-correctness one).
 // The JS side is uniformly fail-closed; the FROM permissiveness
 // lives on the Swift side so the policy is visible to a Swift
 // reviewer reading SendViewController.tapSend.
 getChecksumAddress: async function(requestId, address) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 if (typeof QuantumCoinSDK.getAddress !== 'function') {
 sendError(requestId, new Error('SDK_GETADDRESS_UNAVAILABLE'));
 return;
 }
 var out = QuantumCoinSDK.getAddress(address);
 sendResult(requestId, { address: out });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 computeAddress: async function(requestId, pubKeyBase64) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 var pubBytes = base64ToBytes(pubKeyBase64);
 var address = QuantumCoinSDK.computeAddress(pubBytes);
 sendResult(requestId, { address: address });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 encryptWalletJson: async function(requestId) {
 var payload = null;
 var input = null;
 var privBytes = null;
 var pubBytes = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
// the seed-words branch is the only user-facing path
 // (the create-wallet handler stages the just-generated seed
 // words to a single-shot JSON envelope and we re-encrypt
 // them here). The private/public key branch reads its key
 // material from the binary channel rather than from the
 // JSON `walletInput`. The `walletInput` envelope therefore
 // no longer carries `privateKey` / `publicKey` strings;
 // callers that previously used that branch (e.g. an
 // import-from-keys-only flow that does not exist today)
 // would need to stage the bytes via the binary channel.
 input = JSON.parse(payload.walletInput || '{}');
 var json;
 if (input.seedWords && input.seedWords.length > 0) {
 var wallet = QuantumCoinSDK.Wallet.fromPhrase(input.seedWords);
 json = wallet.encryptSync(payload.password);
 sendResult(requestId, { json: json, address: wallet.address });
 return;
 }
 if (input.fromBinaryKeys === true) {
 privBytes = pullPayloadBinary(requestId, 'privKey');
 pubBytes = pullPayloadBinary(requestId, 'pubKey');
 var wallet2 = await QuantumCoinSDK.Wallet.fromKeys(privBytes, pubBytes);
 json = wallet2.encryptSync(payload.password);
 sendResult(requestId, { json: json, address: wallet2.address });
 return;
 }
 sendError(requestId, 'encryptWalletJson: no seedWords or binary keys supplied');
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (privBytes) { try { privBytes.fill(0); } catch (_) {} }
 if (pubBytes) { try { pubBytes.fill(0); } catch (_) {} }
 if (input) {
 try { input.seedWords = null; } catch (_) {}
 }
 if (payload) {
 zeroString(payload, 'walletInput');
 zeroString(payload, 'password');
 }
 }
 },

 decryptWalletJson: async function(requestId) {
 var payload = null;
 try {
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
 var wallet = QuantumCoinSDK.Wallet.fromEncryptedJsonSync(
 payload.walletJson, payload.password);
 var seedHex = wallet.seed;
 var seedWords = null;
 if (seedHex) {
 if (!requireSeedWordsSDK(requestId)) return;
 var seedBytes = hexToBytes(seedHex);
 var words = SeedWordsSDK.getWordListFromSeedArray(seedBytes);
 if (Array.isArray(words)) {
 seedWords = words;
 }
 }
 // Stage privateKey/publicKey on the binary channel.
 // The JSON envelope returned to Swift carries only the
 // address + seed metadata. Note: `seed` (hex string) and
 // `seedWords` ([String]) remain in the JSON envelope by
 // design â€” they are user-facing display values that the UI
 // copies to the pasteboard / renders in `RevealWalletViewController`,
 // so a Swift-side String is the natural type for them. The
 // 30 s pasteboard expiry and view-disappear cleanup bound
 // their residency, see Pasteboard.swift / RevealWalletViewController.swift.
 stageWalletKeysBinary(requestId, wallet);
 sendResult(requestId, {
 address: wallet.address,
 seed: seedHex || null,
 seedWords: seedWords
 });
 } catch (e) {
 sendError(requestId, e);
 } finally {
 if (payload) {
 zeroString(payload, 'walletJson');
 zeroString(payload, 'password');
 }
 }
 },

 getAllSeedWords: async function(requestId) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 if (!requireSeedWordsSDK(requestId)) return;
 var words = SeedWordsSDK.getAllSeedWords();
 if (!Array.isArray(words) || words.length === 0) {
 sendError(requestId, 'SeedWordsSDK.getAllSeedWords returned empty (seed-words not initialized)');
 return;
 }
 sendResult(requestId, { words: words });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 doesSeedWordExist: async function(requestId, word) {
 try {
 if (!(await ensureInitialized(requestId))) return;
 if (!requireSeedWordsSDK(requestId)) return;
 var exists = SeedWordsSDK.doesSeedWordExist(word);
 sendResult(requestId, { exists: exists === true });
 } catch (e) {
 sendError(requestId, e);
 }
 },

 scryptDerive: async function(requestId) {
 var payload = null;
 var passwordBytes = null;
 var saltBytes = null;
 var keyBytes = null;
 var hexKey = null;
 var keyHex = null;
 var keyBase64 = null;
 try {
 if (!requireSDK(requestId)) return;
 if (!(await ensureInitialized(requestId))) return;
 payload = pullPayload(requestId);
 if (!payload) return;
// defense-in-depth minimum-bound check on the
 // scrypt parameters. Swift's `JsBridge.scryptDerive`
 // already passes the canonical
 // (SCRYPT_N, SCRYPT_R, SCRYPT_P, SCRYPT_KEY_LEN) defaults;
 // a future caller that passes a debug-weakened N (e.g.
 // 1024 in a unit test or UI automation harness) would
 // otherwise silently weaken the strongbox KDF and on
 // disk become unrecoverable on a release build that
 // expects the strong parameters. The thresholds match
 // the review-recommended defaults: N >= 16384 (2^14, the OWASP
 // floor), r >= 8 (RFC 7914 SHOULD), p >= 1 (RFC 7914
 // MUST), keyLen >= 16 (128-bit security floor). Reject
 // outside-bounds requests with an explicit error so the
 // misconfiguration is loud, not silent.
 if (typeof payload.N !== 'number' || payload.N < 16384 ||
     typeof payload.r !== 'number' || payload.r < 8 ||
     typeof payload.p !== 'number' || payload.p < 1 ||
     typeof payload.keyLen !== 'number' || payload.keyLen < 16) {
 sendError(requestId,
   new Error('scryptDerive parameters below minimum bounds'));
 return;
 }
 passwordBytes = new TextEncoder().encode(payload.password);
 saltBytes = Uint8Array.from(
 atob(payload.salt), function(c) { return c.charCodeAt(0); });
 hexKey = QuantumCoinSDK.scryptSync(
 passwordBytes, saltBytes, payload.N, payload.r, payload.p, payload.keyLen);
 keyHex = hexKey.startsWith("0x") ? hexKey.slice(2) : hexKey;
 keyBytes = new Uint8Array(
 keyHex.match(/.{2}/g).map(function(b) { return parseInt(b, 16); }));
 keyBase64 = btoa(String.fromCharCode.apply(null, keyBytes));
 sendResult(requestId, { key: keyBase64 });
 } catch (e) {
 sendError(requestId, e);
 } finally {
 // Zeroize every intermediate that held the password or
 // derived material before returning control. JS string
 // immutability means hexKey/keyHex/keyBase64 can't be wiped
 // in place; we drop the references so GC can collect them
 // as soon as possible.
 if (passwordBytes) { try { passwordBytes.fill(0); } catch (_) {} }
 if (saltBytes) { try { saltBytes.fill(0); } catch (_) {} }
 if (keyBytes) { try { keyBytes.fill(0); } catch (_) {} }
 hexKey = null;
 keyHex = null;
 keyBase64 = null;
 if (payload) {
 zeroString(payload, 'password');
 zeroString(payload, 'salt');
 }
 }
 }
};
</script>
